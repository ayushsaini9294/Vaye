syntax = "proto3";
package vaye.follows;

import "common.proto";

service FollowsService {
  rpc ToggleFollow(ToggleFollowRequest) returns (FollowResponse);
  rpc GetFollowStatus(GetFollowStatusRequest) returns (FollowStatusResponse);
  rpc GetFollowerCount(GetCountRequest) returns (CountResponse);
  rpc GetFollowingCount(GetCountRequest) returns (CountResponse);
  rpc GetFollowers(GetFollowersRequest) returns (UsersListResponse);
  rpc GetFollowing(GetFollowingRequest) returns (UsersListResponse);
}

message ToggleFollowRequest {
  string session_token = 1;
  string username = 2;
}

message FollowResponse {
  bool success = 1;
  bool following = 2;
  optional string error = 3;
}

message GetFollowStatusRequest {
  string session_token = 1;
  string username = 2;
}

message FollowStatusResponse {
  bool following = 1;
}

message GetCountRequest {
  string username = 1;
}

message CountResponse {
  int32 count = 1;
}

message GetFollowersRequest {
  string username = 1;
  optional string session_token = 2;
  vaye.common.PaginationRequest pagination = 3;
}

message GetFollowingRequest {
  string username = 1;
  optional string session_token = 2;
  vaye.common.PaginationRequest pagination = 3;
}

message FollowUser {
  string id = 1;
  string username = 2;
  string display_name = 3;
  optional string avatar_url = 4;
  optional string bio = 5;
  bool is_following = 6;
}

message UsersListResponse {
  repeated FollowUser users = 1;
  int32 total = 2;
}
